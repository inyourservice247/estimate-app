<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Estimate Builder</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1>Estimate Builder</h1>
            <p class="subtitle">Create and download estimates instantly</p>
        </div>

        <!-- Main content wrapper for scrolling -->
        <div class="content-wrapper">
            <!-- Top Section -->
            <div class="top-section">
                <div class="form-group">
                    <label>Business Name</label>
                    <input type="text" id="businessName" placeholder="Enter your business name" value="Your Business">
                </div>

                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="customerName" placeholder="Enter customer name">
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="estimateDate">
                </div>
            </div>

            <!-- Estimate Table Section -->
            <div class="table-section">
                <div class="table-header">
                    <h2>Items</h2>
                    <button class="btn-add-item" id="addItemBtn">+ Add Item</button>
                </div>

                <div class="table-scroll">
                    <table class="estimate-table" id="estimateTable">
                        <thead>
                            <tr>
                                <th class="col-sno">S.No</th>
                                <th class="col-particular">Particular</th>
                                <th class="col-qty">Qty</th>
                                <th class="col-rate">Rate</th>
                                <th class="col-amount">Amount</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr class="item-row" data-row-id="1">
                                <td class="col-sno"><span class="serial-number">1</span></td>
                                <td class="col-particular">
                                    <input type="text" class="input-particular" placeholder="Item description">
                                </td>
                                <td class="col-qty">
                                    <input type="number" class="input-qty" placeholder="0" value="0" min="0" step="1">
                                </td>
                                <td class="col-rate">
                                    <input type="number" class="input-rate" placeholder="0" value="0" min="0" step="0.01">
                                </td>
                                <td class="col-amount">
                                    <span class="amount-value">0.00</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Total Section -->
                <div class="total-section">
                    <div class="total-row">
                        <span class="total-label">Subtotal</span>
                        <span class="total-value" id="subtotal">0.00</span>
                    </div>
                    <div class="divider"></div>
                    <div class="total-row final">
                        <span class="total-label">Total Amount</span>
                        <span class="total-amount" id="totalAmount">0.00</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="btn btn-primary" id="downloadBtn">
                    <span class="icon">⬇</span> Download as JPEG
                </button>
            </div>

            <!-- Footer Spacing -->
            <div class="footer-spacing"></div>
        </div>
    </div>

    <!-- Hidden estimate preview for download -->
    <div id="estimatePreview" class="estimate-preview">
        <div class="preview-container">
            <div class="preview-header">
                <h1 id="previewBusinessName">Your Business</h1>
                <p class="preview-subtitle">ESTIMATE</p>
            </div>

            <div class="preview-info">
                <div class="info-item">
                    <span class="label">Customer:</span>
                    <span id="previewCustomerName">-</span>
                </div>
                <div class="info-item">
                    <span class="label">Date:</span>
                    <span id="previewDate">-</span>
                </div>
            </div>

            <table class="preview-table">
                <thead>
                    <tr>
                        <th class="col-sno">S.No</th>
                        <th class="col-particular">Particular</th>
                        <th class="col-qty">Qty</th>
                        <th class="col-rate">Rate</th>
                        <th class="col-amount">Amount</th>
                    </tr>
                </thead>
                <tbody id="previewTableBody">
                </tbody>
            </table>

            <div class="preview-total">
                <div class="total-row">
                    <span>Subtotal:</span>
                    <span id="previewSubtotal">0.00</span>
                </div>
                <div class="divider"></div>
                <div class="total-row final">
                    <span>Total Amount:</span>
                    <span id="previewTotalAmount">0.00</span>
                </div>
            </div>

            <div class="preview-footer">
                <p>Thank you for your business!</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
